<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>druv | AI Chat</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass-sidebar { background: rgba(31, 41, 55, 0.8); }
        .chat-container { height: calc(100vh - 160px); }
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; }
        #loading-overlay {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; items-center; justify-content: center; transition: opacity 0.5s;
        }
        .dark #loading-overlay { background: #111827; color: white; }
        /* Prevent layout shift on mobile keyboard */
        .sticky-bottom { position: sticky; bottom: 0; background: inherit; padding-bottom: env(safe-area-inset-bottom); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#f0f4f9',
                            sidebar: '#f8fafd',
                            accent: '#1a73e8'
                        },
                        darkGemini: {
                            bg: '#131314',
                            sidebar: '#1e1f20',
                            accent: '#8ab4f8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gemini-bg dark:bg-darkGemini-bg text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Fallback Loader -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-lg font-medium">Initializing druv...</p>
        </div>
    </div>

    <div id="app" class="flex min-h-screen relative overflow-hidden">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 glass-sidebar border-r border-gray-200 dark:border-gray-800 z-40 transition-transform duration-300 sidebar-closed lg:translate-x-0 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <h1 class="text-xl font-bold tracking-tight text-blue-600 dark:text-blue-400">druv</h1>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <button onclick="createNewChat()" class="mx-4 mb-6 flex items-center gap-3 px-4 py-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl hover:bg-blue-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="font-medium">New Chat</span>
            </button>

            <div id="chat-history" class="flex-1 overflow-y-auto px-2 space-y-1">
                <!-- History Items Inject Here -->
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
                <button onclick="openSettings()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    <span>Settings</span>
                </button>
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-darkGemini-bg relative">
            
            <!-- Top Nav -->
            <header class="h-16 flex items-center justify-between px-4 border-b border-gray-100 dark:border-gray-800 shrink-0">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-2">
                    <span id="current-model-tag" class="text-xs font-medium px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded text-gray-500 uppercase">deepseek-r1</span>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                    <div class="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-3xl font-bold shadow-lg">d</div>
                    <h2 class="text-3xl font-semibold">How can I help you today?</h2>
                    <p class="text-gray-500 max-w-md">Connect your OpenRouter API key in settings to start chatting with the world's most powerful AI models.</p>
                </div>
                <!-- Messages dynamic -->
            </div>

            <!-- Input Area -->
            <div class="sticky-bottom border-t border-gray-100 dark:border-gray-800 p-4 bg-white dark:bg-darkGemini-bg">
                <div class="max-w-4xl mx-auto relative">
                    <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full p-4 pr-16 bg-gray-100 dark:bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-60 overflow-y-auto transition-all"></textarea>
                    <button id="send-btn" onclick="handleSendMessage()" class="absolute right-3 bottom-3 p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-gray-400">druv may display inaccurate info. Powered by OpenRouter.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-3xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Settings</h3>
                    <button onclick="closeSettings()" class="text-gray-500 hover:text-black dark:hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" placeholder="sk-or-v1-..." class="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Model ID</label>
                        <input type="text" id="model-input" placeholder="deepseek/deepseek-r1:free" class="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" placeholder="You are a helpful AI assistant..." class="w-full p-3 bg-gray-100 dark:bg-gray-800 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all mt-4">Save Changes</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script>
        // --- State Management ---
        let state = {
            apiKey: localStorage.getItem('druv_apiKey') || '',
            model: localStorage.getItem('druv_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('druv_systemPrompt') || 'You are druv, a helpful AI assistant.',
            chats: JSON.parse(localStorage.getItem('druv_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('druv_theme') === 'dark',
            isStreaming: false
        };

        const elements = {
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            chatHistory: document.getElementById('chat-history'),
            messagesContainer: document.getElementById('messages-container'),
            userInput: document.getElementById('user-input'),
            welcomeScreen: document.getElementById('welcome-screen'),
            settingsModal: document.getElementById('settings-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            systemPromptInput: document.getElementById('system-prompt-input'),
            themeText: document.getElementById('theme-text'),
            modelTag: document.getElementById('current-model-tag')
        };

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderChatHistory();
            elements.apiKeyInput.value = state.apiKey;
            elements.modelInput.value = state.model;
            elements.systemPromptInput.value = state.systemPrompt;
            elements.modelTag.innerText = state.model.split('/').pop();
            
            // Auto-resize textarea
            elements.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Enter to send (Shift+Enter for newline)
            elements.userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !state.isStreaming) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            // Hide loader
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
            }, 800);
        });

        // --- Core Functions ---

        function toggleSidebar() {
            elements.sidebar.classList.toggle('sidebar-closed');
            elements.sidebar.classList.toggle('sidebar-open');
            elements.sidebarOverlay.classList.toggle('hidden');
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('druv_theme', state.isDarkMode ? 'dark' : 'light');
            elements.themeText.innerText = state.isDarkMode ? 'Light Mode' : 'Dark Mode';
        }

        function initTheme() {
            if (state.isDarkMode) {
                document.documentElement.classList.add('dark');
                elements.themeText.innerText = 'Light Mode';
            }
        }

        function openSettings() { elements.settingsModal.classList.remove('hidden'); }
        function closeSettings() { elements.settingsModal.classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = elements.apiKeyInput.value.trim();
            state.model = elements.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            state.systemPrompt = elements.systemPromptInput.value.trim();
            
            localStorage.setItem('druv_apiKey', state.apiKey);
            localStorage.setItem('druv_model', state.model);
            localStorage.setItem('druv_systemPrompt', state.systemPrompt);
            
            elements.modelTag.innerText = state.model.split('/').pop();
            closeSettings();
            alert('Settings saved!');
        }

        function createNewChat() {
            state.currentChatId = null;
            elements.messagesContainer.innerHTML = '';
            elements.messagesContainer.appendChild(elements.welcomeScreen);
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function renderChatHistory() {
            elements.chatHistory.innerHTML = state.chats.map(chat => `
                <div class="group relative flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer transition-all ${state.currentChatId === chat.id ? 'bg-gray-200 dark:bg-gray-800' : 'hover:bg-gray-100 dark:hover:bg-gray-800'}" onclick="loadChat('${chat.id}')">
                    <svg class="w-4 h-4 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    <span class="truncate text-sm font-medium pr-8">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="absolute right-2 opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            const chat = state.chats.find(c => c.id === id);
            if (!chat) return;
            state.currentChatId = id;
            elements.messagesContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            localStorage.setItem('druv_chats', JSON.stringify(state.chats));
            if (state.currentChatId === id) createNewChat();
            renderChatHistory();
        }

        function appendMessageUI(role, content, isStreaming = false) {
            elements.welcomeScreen.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const inner = `
                <div class="max-w-[85%] md:max-w-[70%] rounded-2xl px-4 py-3 ${role === 'user' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-100'}">
                    <div class="prose dark:prose-invert text-sm md:text-base leading-relaxed break-words">
                        ${role === 'user' ? content : marked.parse(content)}
                    </div>
                </div>
            `;
            msgDiv.innerHTML = inner;
            
            if (isStreaming && role === 'assistant') {
                const lastMsg = elements.messagesContainer.lastElementChild;
                if (lastMsg && lastMsg.dataset.role === 'assistant') {
                    lastMsg.querySelector('.prose').innerHTML = marked.parse(content);
                    return lastMsg;
                }
                msgDiv.dataset.role = 'assistant';
            }
            
            elements.messagesContainer.appendChild(msgDiv);
            elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
            return msgDiv;
        }

        async function handleSendMessage() {
            const text = elements.userInput.value.trim();
            if (!text || state.isStreaming) return;
            if (!state.apiKey) {
                alert('Please add an OpenRouter API Key in Settings');
                openSettings();
                return;
            }

            // Init Chat session if new
            if (!state.currentChatId) {
                state.currentChatId = Date.now().toString();
                state.chats.unshift({
                    id: state.currentChatId,
                    title: text.substring(0, 30) + (text.length > 30 ? '...' : ''),
                    messages: []
                });
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            
            state.isStreaming = true;
            let assistantContent = "";
            const assistantMsgUI = appendMessageUI('assistant', '...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: "system", content: state.systemPrompt },
                            ...currentChat.messages
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                assistantContent = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        if (line.includes('[DONE]')) break;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0]?.delta?.content || "";
                                assistantContent += content;
                                appendMessageUI('assistant', assistantContent, true);
                            } catch (e) {
                                console.error("Error parsing stream", e);
                            }
                        }
                    }
                }

                currentChat.messages.push({ role: 'assistant', content: assistantContent });
                localStorage.setItem('druv_chats', JSON.stringify(state.chats));
                renderChatHistory();

            } catch (error) {
                console.error(error);
                appendMessageUI('assistant', "⚠️ Error: Connection failed. Check your API key and network.");
            } finally {
                state.isStreaming = false;
            }
        }
    </script>
</body>
</html>
